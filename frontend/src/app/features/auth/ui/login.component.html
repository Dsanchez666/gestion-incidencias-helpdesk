<section class="login-layout">
  <article class="login-card">
    <h1>Gestion de Incidencias ETNA</h1>
    <p>Acceso de operadores a los buzones de soporte.</p>

    <label>
      Usuario
      <input [(ngModel)]="username" placeholder="Ej. operador" />
    </label>

    <label>
      Clave
      <input [(ngModel)]="password" type="password" placeholder="Introduce tu clave" />
    </label>

    <button [disabled]="isLoading" (click)="submit()">
      {{ isLoading ? 'Validando...' : 'Entrar' }}
    </button>

    <p class="error" *ngIf="error">{{ error }}</p>
  </article>
</section>
